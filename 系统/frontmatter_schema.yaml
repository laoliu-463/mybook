# Frontmatter Schema - current automation contract

required:
  - title
  - type
  - domain
  - tags
  - source
  - created
  - status
  - summary
  - processed_at

enum:
  type:
    - concept
    - overview
    - interview
    - project
    - resource
    - note
  status:
    - draft
    - review
    - evergreen
    - done

optional:
  - aliases
  - topic
  - question
  - source_title
  - source_section
  - updated
  - skill
  - next_review
  - interval
  - ease
  - reps

required_sections:
  - TL;DR
  - References
  - 【需要人工复核】
